<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="image-container">
        <img src="background-plant.avif" class="background-img">
        <div class="logo-body">
            <img src="odin-lined.png" class="logo">
            <div class="logo-text">ODIN</div>
        </div>
        <div class="footer-credit">Photo by Halie West on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">Unsplash</a></div>
    </div>
    <div class="form-container">
        <div class="header-text">
            <div class="text-motivation">This is not a real online service! You know you need something 
                <br>
                like this in your life to help you realize your deepest dreams.
                <br>
                Sign up <i>now</i> to get started.
                <br>
                <br>
                You <i>know</i> you want to.
            </div>
        </div>
        <div class="form-section">
            <div id="doit">Let's do this!</div>
            <form action="example.com/path" method="post">
                <div class="form-contents">
                    <div class="first-column">
                        <label for="first_name">First Name:</label>
                        <input type="text" id="first_name">
                        <label for="email">Email:</label>
                        <input type="email" id="user_email">
                        <label for="password">Password:</label>
                        <input type="password" id="user_password">
                    </div>
                    <div class="second-column">
                        <label for="last_name">Last Name:</label>
                        <input type="text" id="last_name">
                        <label for="phone_number">Phone Number:</label>
                        <input type="tel" id="phone_number">
                        <label for="confirm_password">Confirm Password:</label>
                        <input type="password" id="confirm_password">
                    </div>
                </div>
            </form>
        </div>
        <div class="account-section">
            <button class="create">Create Account</button>
            <div id="account-text">Already have an account? Log in</div>
        </div>
    </div>
</body>
</html>
